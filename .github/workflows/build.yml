name: Build MFD APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Unzip Project
        run: unzip MFD-v2-Android.zip
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > MFD2/local.properties
      - name: Fix API URL in GeminiClient
        run: |
          sed -i 's/gemini-1.5-flash/gemini-1.5-flash-latest/g' \
            MFD2/app/src/main/java/com/mfd/assistant/GeminiClient.java
          grep "MODEL\|BASE_URL" MFD2/app/src/main/java/com/mfd/assistant/GeminiClient.java
      - name: Build Debug APK
        run: cd MFD2 && gradle assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MFD-v2-fixed
          path: MFD2/app/build/outputs/apk/debug/app-debug.apk
